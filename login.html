    <div class="projects-container">
        <div class="login-card">
            <div class="project-content">
                <h3 class="project-title">Employee Login</h3>
                <p class="project-description">AUTHORIZED PERSONNEL ONLY // ACCESS LOGGED</p>

                <div class="field">
                    <label for="username" class="project-description">Username</label>
                    <input type="text" id="username" placeholder="Username:" autocomplete="username" autofocus>
                </div>

                <div class="field">
                    <label for="password" class="project-description">Password</label>
                    <input type="password" id="password" placeholder="Password:" autocomplete="current-password">
                </div>

                <button class="btn" id="loginBtn" onclick="handleLogin()">
                    <span class="btn-label" class="hover">Authenticate</span>
                    <div class="spinner"></div>
                </button>
                <br>
                <div class="demo-hint" class="project-description">
                    Demo credentials:<br>
                    <strong>alice</strong> / password123 &nbsp;·&nbsp; <strong>bob</strong> / hunter2
                </div>

                <div class="error-box" id="errorBox">
                    <span>⚠</span><span id="errorMsg">Invalid credentials.</span>
                </div>
            </div>
        </div>

    </div>
    <script>
        // ── Config: point this at your deployed Cloudflare Worker URL ──
        const API_BASE = "https://employee-auth.calebethan485.workers.dev";
        // For local dev with wrangler dev, use: const API_BASE = "http://localhost:8787";

        const btn = document.getElementById("loginBtn");
        const errorBox = document.getElementById("errorBox");
        const errorMsg = document.getElementById("errorMsg");

        // Allow Enter key
        document.addEventListener("keydown", e => {
            if (e.key === "Enter") handleLogin();
        });

        // Ripple effect
        btn.addEventListener("mousedown", function (e) {
            const r = document.createElement("span");
            r.className = "ripple";
            const size = Math.max(btn.clientWidth, btn.clientHeight);
            r.style.cssText = `width:${size}px;height:${size}px;left:${e.offsetX - size / 2}px;top:${e.offsetY - size / 2}px`;
            btn.appendChild(r);
            r.addEventListener("animationend", () => r.remove());
        });

        async function handleLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            if (!username || !password) {
                showError("Please enter both username and password.");
                return;
            }

            setLoading(true);
            hideError();

            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",          // ← sends/receives cookies
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.ok) {
                    // Redirect to secret dashboard
                    window.location.href = "dashboard.html";
                } else {
                    showError(data.error ?? "Authentication failed.");
                }
            } catch (err) {
                showError("Could not reach server. Is the Worker deployed?");
                console.error(err);
            } finally {
                setLoading(false);
            }
        }

        function setLoading(on) {
            btn.disabled = on;
            btn.classList.toggle("loading", on);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorBox.classList.add("visible");
        }

        function hideError() {
            errorBox.classList.remove("visible");
        }
    </script>
    <script type="text/javascript"
