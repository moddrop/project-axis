<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login — Project Axis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="ok.css?v=4">
    <link rel="icon" type="image/x-icon" href="logo.png">
    <style>
        .login-main {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            background: #1c1b19;
            background-image: radial-gradient(circle, rgba(240,168,0,0.07) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }
        @media (max-width: 640px) {
            .login-main { padding: 24px 16px; align-items: flex-start; padding-top: 40px; }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="index.html" aria-label="Project Axis Home"><img height="50px" width="50px" src="logo.png" alt="Project Axis logo"></a>
        <div class="navbar-wrapper">
            <a href="index.html" class="hover">HOME</a>
            <a href="aboutus.html" class="hover">INFO</a>
            <a href="blog.html" class="hover">HISTORY</a>
            <a href="project.html" class="hover">OVERVIEW</a>
            <a href="donate.html" class="hover">DONORS</a>
            <a href="gallery.html" class="hover">GALLERY</a>
            <a href="login.html" class="hover">LOGIN</a>
            <a href="proposal.html" class="hover">PROPOSAL</a>
            <a href="news.html" class="hover">NEWS</a>
        </div>
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </div>

    <nav class="mobile-menu" id="mobileMenu">
        <a href="index.html">HOME</a>
        <a href="aboutus.html">INFO</a>
        <a href="blog.html">HISTORY</a>
        <a href="project.html">OVERVIEW</a>
        <a href="donate.html">DONORS</a>
        <a href="gallery.html">GALLERY</a>
        <a href="login.html">LOGIN</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="news.html">NEWS</a>
    </nav>

    <main class="login-main">
        <div class="login-card">
            <div class="login-card-mark">
                <img src="logo.png" alt="Project Axis" height="28" width="28">
                <span>PROJECT AXIS</span>
            </div>

            <p class="login-eyebrow">// Authorized Personnel Only</p>
            <h2 class="login-title">Sign in</h2>

            <div class="error-box" id="errorMsg" role="alert" aria-live="polite"></div>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" id="submitBtn" class="btn">
                    <span class="btn-label">Sign in</span>
                    <div class="spinner" aria-hidden="true"></div>
                </button>
            </form>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        const API_BASE = "https://auth.projectaxis.net";

        const form      = document.getElementById("loginForm");
        const errorMsg  = document.getElementById("errorMsg");
        const submitBtn = document.getElementById("submitBtn");
        const btnLabel  = submitBtn.querySelector(".btn-label");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorMsg.classList.remove("visible");
            errorMsg.textContent = "";
            submitBtn.disabled = true;
            submitBtn.classList.add("loading");
            btnLabel.textContent = "Signing in…";

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            try {
                const res  = await fetch(`${API_BASE}/api/login`, {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || "Login failed.";
                    errorMsg.classList.add("visible");
                    submitBtn.disabled = false;
                    submitBtn.classList.remove("loading");
                    btnLabel.textContent = "Sign in";
                    return;
                }

                window.location.href = "dashboard.html";

            } catch (err) {
                errorMsg.textContent = "Could not reach the server. Try again.";
                errorMsg.classList.add("visible");
                submitBtn.disabled = false;
                submitBtn.classList.remove("loading");
                btnLabel.textContent = "Sign in";
            }
        });
    </script>
</body>

</html>
