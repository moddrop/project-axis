<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Acme Corp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2e;
            --border-lit: #2e2e4e;
            --accent: #5b6af0;
            --accent2: #8b9cff;
            --green: #4af08e;
            --yellow: #f0c44a;
            --danger: #f05b6a;
            --text: #e8e8f2;
            --muted: #6b6b88;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .login-card {
            width: 360px;
            background: var(--surface);
            border: 1px solid var(--border-lit);
            border-radius: 3px;
            padding: 32px;
        }

        .login-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 2px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .04em;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border-lit);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 2px;
            outline: none;
            transition: border-color .15s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 12px;
            border-radius: 2px;
            cursor: pointer;
            margin-top: 8px;
            transition: background .15s;
        }

        button:hover:not(:disabled) {
            background: var(--accent2);
        }

        button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .error {
            display: none;
            font-size: 11px;
            color: var(--danger);
            background: rgba(240, 91, 106, .1);
            border: 1px solid rgba(240, 91, 106, .3);
            border-radius: 2px;
            padding: 10px 12px;
            margin-bottom: 16px;
        }

        .error.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon"></div>
            <div class="logo-text">Project Axis</div>
        </div>
        <h1>Sign in</h1>
        <p class="subtitle">Internal employee access only.</p>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" id="submitBtn">Sign in</button>
        </form>
    </div>

    <script>
        // Replace with YOUR deployed Worker URL after `wrangler deploy`
        const API_BASE = "https://employee-auth.<your-subdomain>.workers.dev";
        // Local dev: const API_BASE = "http://localhost:8787";

        const form = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorMsg.classList.remove("visible");
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in…";

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: "POST",
                    credentials: "include",   // ← required to receive the session cookie
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || "Login failed.";
                    errorMsg.classList.add("visible");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Sign in";
                    return;
                }

                window.location.href = "dashboard.html";

            } catch (err) {
                errorMsg.textContent = "Could not reach the server. Try again.";
                errorMsg.classList.add("visible");
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign in";
            }
        });
    </script>
</body>

</html>
