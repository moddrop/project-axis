<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Tester</title>
<style>
  body { font-family: monospace; background: #0a0a0f; color: #e8e8f2; padding: 32px; }
  h1 { margin-bottom: 24px; color: #8b9cff; }
  .btn {
    background: #5b6af0; color: #fff; border: none;
    padding: 10px 20px; margin: 6px; cursor: pointer;
    font-family: monospace; font-size: 13px; border-radius: 2px;
  }
  .btn:hover { background: #8b9cff; }
  .btn.red { background: #f05b6a; }
  .btn.red:hover { background: #ff8b96; }
  #log {
    margin-top: 24px;
    background: #111118;
    border: 1px solid #2e2e4e;
    padding: 20px;
    border-radius: 3px;
    min-height: 200px;
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.8;
  }
  .success { color: #4af08e; }
  .error   { color: #f05b6a; }
  .info    { color: #8b9cff; }
  .muted   { color: #6b6b88; }
  input {
    background: #111118; border: 1px solid #2e2e4e;
    color: #e8e8f2; font-family: monospace;
    padding: 8px 12px; margin: 4px; border-radius: 2px;
    font-size: 13px; width: 180px;
  }
</style>
</head>
<body>

<h1>🔧 Worker API Tester</h1>

<div>
  <input id="apiBase" placeholder="Worker URL" value="https://your-worker.calebethan485.workers.dev">
</div>
<div style="margin-top:12px">
  <input id="username" placeholder="Username" value="alice">
  <input id="password" placeholder="Password" value="password123" type="password">
</div>
<div style="margin-top:12px">
  <button class="btn" onclick="testLogin()">▶ Test Login</button>
  <button class="btn" onclick="testMe()">▶ Test /api/me</button>
  <button class="btn red" onclick="testLogout()">▶ Test Logout</button>
  <button class="btn" onclick="testAll()">▶ Run All Tests</button>
  <button class="btn" style="background:#333" onclick="clearLog()">Clear</button>
</div>

<div id="log"><span class="muted">Results will appear here...</span></div>

<script>
  const log = document.getElementById("log");

  function print(msg, type = "") {
    const span = document.createElement("span");
    span.className = type;
    span.textContent = msg + "\n";
    if (log.querySelector(".muted")) log.innerHTML = "";
    log.appendChild(span);
    log.scrollTop = log.scrollHeight;
  }

  function clearLog() {
    log.innerHTML = '<span class="muted">Results will appear here...</span>';
  }

  function getBase() {
    return document.getElementById("apiBase").value.trim().replace(/\/$/, "");
  }

  async function testLogin() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    print(`\n── POST /api/login ──────────────────`, "info");
    print(`Sending: { username: "${username}", password: "***" }`, "muted");
    try {
      const res = await fetch(`${getBase()}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        print(`✅ ${res.status} Login successful!`, "success");
        print(`   Name: ${data.name}`, "success");
        print(`   Role: ${data.role}`, "success");
      } else {
        print(`❌ ${res.status} ${data.error}`, "error");
      }
    } catch (err) {
      print(`❌ Network error: ${err.message}`, "error");
    }
  }

  async function testMe() {
    print(`\n── GET /api/me ──────────────────────`, "info");
    try {
      const res = await fetch(`${getBase()}/api/me`, {
        credentials: "include"
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        print(`✅ ${res.status} Session valid!`, "success");
        print(`   User: ${data.name} (${data.sub})`, "success");
        print(`   Role: ${data.role}`, "success");
      } else {
        print(`❌ ${res.status} ${data.error}`, "error");
      }
    } catch (err) {
      print(`❌ Network error: ${err.message}`, "error");
    }
  }

  async function testLogout() {
    print(`\n── POST /api/logout ─────────────────`, "info");
    try {
      const res = await fetch(`${getBase()}/api/logout`, {
        method: "POST",
        credentials: "include"
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        print(`✅ ${res.status} Logged out successfully!`, "success");
      } else {
        print(`❌ ${res.status} Logout failed`, "error");
      }
    } catch (err) {
      print(`❌ Network error: ${err.message}`, "error");
    }
  }

  async function testAll() {
    print(`\n════ Running all tests ════`, "info");
    await testLogin();
    await testMe();
    await testLogout();
    await testMe(); // should fail after logout
    print(`\n════ Done ════`, "info");
  }
</script>
</body>
</html>
